name: opencode

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request:
    types: [opened, reopened, ready_for_review]

concurrency:
  group: pr-${{ github.event.number || github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  opencode:
    if: |
      (github.event_name == 'pull_request') ||
      (github.event_name != 'pull_request' && github.event.comment.user.login != 'argus-cgartlab[bot]' && (contains(github.event.comment.body, '/oc') || contains(github.event.comment.body, '/opencode')))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      issues: write
      pull-requests: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Generate App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.ARGUS_APP_ID }}
          private-key: ${{ secrets.ARGUS_PRIVATE_KEY }}

      - name: Configure git with app token
        run: |
          git config user.name "argus-cgartlab[bot]"
          git config user.email "291769438+argus-cgartlab[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/${{ github.repository }}.git

      - name: Run OpenCode
        uses: anomalyco/opencode/github@v1.16.2
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        with:
          model: opencode/deepseek-v4-flash-free
          use_github_token: true
